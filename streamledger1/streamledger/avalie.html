<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamLedger | Cadastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html">
        <img src="img/logo.png" alt="StreamLedger" class="logo-img">
      </a>
      <nav>
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="pesquisa.html">Pesquisa</a></li>
          <li><a href="avalie.html" class="active">Cadastro</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="avalie-section">
        <div class="avalie-inner">

          <div class="avalie-form-side">
            <h1>Seja um Ledger</h1>
            <p class="subtitle">Tenha acesso a atualizações em primeira mão</p>

            <form action="sucesso.html" method="get">

              <div class="form-group">
                <label class="form-label" for="nome">Nome completo</label>
                <div class="input-wrap">
                  <span class="input-icon">&#128100;</span>
                  <input
                    class="form-input"
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Digite seu nome"
                    required
                    minlength="2"
                  >
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <div class="input-wrap">
                  <span class="input-icon">&#9993;</span>
                  <input
                    class="form-input"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Digite seu e-mail"
                    required
                  >
                </div>
              </div>

              <button type="submit" class="btn-concluir">Concluir</button>

            </form>
          </div>

          <div class="avalie-img">
            <img src="img/hero-dashboard.svg" alt="Dashboard StreamLedger">
          </div>

        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <img src="img/logo.png" alt="StreamLedger" class="footer-logo-img">
      <div class="footer-text">
        <strong>StreamLedger © 2026</strong><br>
        Desenvolvido por Bruna Sousa &bull; Gabriel Kott &bull; Caio Leme &bull; Gabriele Lopes &bull; Davi Simione
      </div>
    </div>
  </footer>

</body>
</html>
