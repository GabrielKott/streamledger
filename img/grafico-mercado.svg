<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DFF9B" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#1a2a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DFF9B"/>
      <stop offset="100%" stop-color="#1e4a2a"/>
    </linearGradient>
  </defs>

  <ellipse cx="190" cy="160" rx="170" ry="130" fill="url(#glow)"/>

  <!-- Eixo Y -->
  <line x1="60" y1="20" x2="60" y2="220" stroke="rgba(93,255,155,0.25)" stroke-width="1.5"/>
  <!-- Eixo X -->
  <line x1="60" y1="220" x2="340" y2="220" stroke="rgba(93,255,155,0.25)" stroke-width="1.5"/>

  <!-- Linhas guia -->
  <line x1="60" y1="170" x2="340" y2="170" stroke="rgba(93,255,155,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="120" x2="340" y2="120" stroke="rgba(93,255,155,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="70"  x2="340" y2="70"  stroke="rgba(93,255,155,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Labels eixo Y -->
  <text x="50" y="224" text-anchor="end" fill="rgba(93,255,155,0.5)" font-size="10" font-family="monospace">0</text>
  <text x="50" y="174" text-anchor="end" fill="rgba(93,255,155,0.5)" font-size="10" font-family="monospace">50B</text>
  <text x="50" y="124" text-anchor="end" fill="rgba(93,255,155,0.5)" font-size="10" font-family="monospace">100B</text>
  <text x="50" y="74"  text-anchor="end" fill="rgba(93,255,155,0.5)" font-size="10" font-family="monospace">150B</text>

  <!-- Barras -->
  <rect x="75"  y="175" width="32" height="45"  rx="4" fill="url(#bar1)" opacity="0.75"/>
  <text x="91"  y="235" text-anchor="middle" fill="rgba(93,255,155,0.6)" font-size="10" font-family="monospace">2021</text>

  <rect x="125" y="155" width="32" height="65"  rx="4" fill="url(#bar1)" opacity="0.80"/>
  <text x="141" y="235" text-anchor="middle" fill="rgba(93,255,155,0.6)" font-size="10" font-family="monospace">2022</text>

  <rect x="175" y="128" width="32" height="92"  rx="4" fill="url(#bar1)" opacity="0.88"/>
  <text x="191" y="235" text-anchor="middle" fill="rgba(93,255,155,0.6)" font-size="10" font-family="monospace">2023</text>

  <rect x="225" y="98"  width="32" height="122" rx="4" fill="url(#bar1)" opacity="0.93"/>
  <text x="241" y="235" text-anchor="middle" fill="rgba(93,255,155,0.6)" font-size="10" font-family="monospace">2024</text>

  <rect x="275" y="62"  width="32" height="158" rx="4" fill="url(#bar1)" filter="url(#glow2)"/>
  <text x="291" y="235" text-anchor="middle" fill="rgba(93,255,155,0.7)" font-size="10" font-family="monospace">2025</text>

  <!-- Valor topo -->
  <text x="291" y="54" text-anchor="middle" fill="#5DFF9B" font-size="12" font-weight="bold" font-family="monospace" filter="url(#glow2)">$188B</text>

  <!-- Linha de tendência -->
  <polyline points="91,172 141,152 191,125 241,95 291,59"
    fill="none" stroke="#5DFF9B" stroke-width="2"
    stroke-dasharray="5,3" stroke-linecap="round" opacity="0.5"/>

  <circle cx="291" cy="62" r="5" fill="#5DFF9B" filter="url(#glow2)"/>

  <!-- Sparkles -->
  <text x="330" y="60"  fill="#5DFF9B" font-size="10" opacity="0.5">✦</text>
  <text x="55"  y="50"  fill="#5DFF9B" font-size="7"  opacity="0.4">•</text>
  <text x="350" y="180" fill="#5DFF9B" font-size="7"  opacity="0.4">•</text>
</svg>
